[package]
name = "korea-cli"
version = "0.1.0"
edition = "2021"
description = "Access Korea's public data APIs with natural language. CLI + MCP server."
license = "MIT"
repository = "https://github.com/JunsikChoi/korea-cli"
homepage = "https://koreacli.com"
readme = "README.md"
keywords = ["korea", "public-data", "cli", "mcp", "openapi"]
categories = ["command-line-utilities", "api-bindings"]

[dependencies]
clap = { version = "4", features = ["derive"] }
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.12", features = ["json"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
directories = "6"
toml = "0.8"
regex = "1"
dotenvy = "0.15"
chrono = { version = "0.4", features = ["serde"] }

[dev-dependencies]
tempfile = "3"
